<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Dashboard Pasien - Rumah Sakit Viamedika</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/pasien2.css" />
</head>
<body>

  <div class="dashboard-container">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="logo">
        <img src="../../assets/logo/Logors.png" alt="Logo" width="58" />
        <span class="logo-name">Rumah Sakit<br><small>Viamedika</small></span>
      </div>

      <nav class="sidebar-menu">
        <a href="#" class="menu-item active">
          <img src="../../assets/icons/pendaftaran.png" width="18" />
          <span>Pendaftaran</span>
        </a>
      </nav>

      <button class="btn-logout" onclick="window.location.href='../../Halaman/auth/masuk.html'">
        <img src="../../assets/icons/logout.png" width="18" />
        Log Out
      </button>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

      <!-- HEADER -->
      <div class="header">
        <div class="header-left">
          <h2>Pembuatan Tiket</h2>
          <p>Pembuatan Tiket &bull; ID Terminal: REG-01</p>
        </div>
        <div class="header-right">
          <div class="user-info">
            <div class="user-avatar">P</div>
            <div>
              <p class="user-name">Pasien</p>
              <p class="user-role">Zahira Alfiyar</p>
            </div>
          </div>
        </div>
      </div>

      <!-- CARD PILIH JENIS PASIEN -->
      <div class="content-area">
        <div class="card-pilih">
          <div class="card-right">
            <img src="../../assets/images/Dokter.png" alt="Dokter" class="dokter-img" />
          </div>

          <div class="card-left">
            <h2>Pilih Jenis Pasien</h2>
            <p>Silakan pilih salah satu jenis pasien di bawah ini</p>

            <div class="pilihan-buttons">
              <button class="btn-pilihan active" onclick="pilihJenis('baru', this)">Pasien Baru</button>
              <button class="btn-pilihan" onclick="pilihJenis('lama', this)">Pasien Lama</button>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <script src="../../js/main.js"></script>
  <script>
    function pilihJenis(jenis, el) {
      document.querySelectorAll('.btn-pilihan').forEach(btn => btn.classList.remove('active'));
      el.classList.add('active');

      setTimeout(() => {
        if (jenis === 'baru') {
          window.location.href = 'form_pasien_baru.html';
        } else {
          window.location.href = 'form_pasien_lama.html';
        }
      }, 150);
    }
  </script>
</body>
</html>
